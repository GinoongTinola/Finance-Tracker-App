function getDepositLog(year) {
    if (!budgetData.data[year]) return [];
    if (!budgetData.data[year].depositLog) budgetData.data[year].depositLog = [];
    return budgetData.data[year].depositLog;
}

function renderDepositEntries(year) {
    const wrap = document.getElementById(`depositLogWrap-${year}`);
    if (!wrap) return;
    const log = getDepositLog(year);
    const goalCats = getGoalCats();
    const goalColors = [
        { line: 'rgba(232,184,75,1)',  btn: 'var(--gold)',   btnDim: 'var(--gold-dim)'   },
        { line: 'rgba(78,205,196,1)',  btn: 'var(--teal)',   btnDim: 'var(--teal-dim)'   },
        { line: 'rgba(167,139,250,1)', btn: 'var(--violet)', btnDim: 'var(--violet-dim)' },
        { line: 'rgba(95,217,135,1)',  btn: 'var(--green)',  btnDim: 'var(--green-dim)'  },
        { line: 'rgba(240,107,107,1)', btn: 'var(--rose)',   btnDim: 'var(--rose-dim)'   },
    ];

    wrap.innerHTML = goalCats.slice(0, 3).map((cat, ci) => {
        const color   = goalColors[ci % goalColors.length];
        const entries = [...log.filter(e => e.catId === cat.id)]
            .sort((a, b) => (a.date || '').localeCompare(b.date || ''));

        const rows = entries.length > 0
            ? entries.map(entry => {
                const isSynced = entry.source === 'table';
                return `<div class="deposit-entry ${isSynced ? 'deposit-entry-synced' : ''}" id="de-${entry.id}">
                    <input type="date" value="${entry.date || ''}"
                        ${isSynced ? 'disabled' : ''}
                        onchange="updateDepositEntry('${year}','${entry.id}','date',this.value)">
                    <input type="number" placeholder="Amount" min="0" value="${entry.amount || ''}"
                        ${isSynced ? 'disabled' : ''}
                        onchange="updateDepositEntry('${year}','${entry.id}','amount',this.value)">
                    <button class="deposit-del-btn" onclick="deleteDepositEntry('${year}','${entry.id}')">✕</button>
                </div>`;
            }).join('')
            : `<div class="deposit-entry-empty">No deposits yet — click + Add</div>`;

        return `<div class="deposit-log-section" style="border-color:${color.line.replace('1)','0.2)')};">
            <div class="deposit-log-section-header" style="border-bottom:1px solid ${color.line.replace('1)','0.12)')};">
                <div class="deposit-log-section-title" style="color:${color.line}">${cat.label}</div>
                <button class="deposit-add-btn"
                    style="color:${color.btn};border-color:${color.line.replace('1)','0.3)')}"
                    onmouseover="this.style.background='${color.btnDim}'"
                    onmouseout="this.style.background='transparent'"
                    onclick="addDepositEntry('${year}','${cat.id}')">+ Add</button>
            </div>
            <div class="deposit-section-body" id="depositSection-${year}-${cat.id}">${rows}</div>
        </div>`;
    }).join('');
}

function addDepositEntry(year, catId) {
    const log = getDepositLog(year);
    const today = new Date().toISOString().split('T')[0];
    log.push({ id: 'dl_' + Date.now(), catId, date: today, amount: '' });
    renderDepositEntries(year);
    autoSave();
}

function updateDepositEntry(year, id, field, value) {
    const entry = getDepositLog(year).find(e => e.id === id);
    if (!entry) return;
    if (field === 'amount') {
        const amt = parseFloat(value);
        if (isNaN(amt) || amt < 0) return;
        if (amt > 10_000_000) { showToast('⚠ Value capped at ₱10,000,000', true); value = 10_000_000; }
        entry.amount = parseFloat(value) || 0;
    } else if (field === 'date') {
        // Validate date is within ±5 years of selected year
        const d = new Date(value + 'T00:00:00');
        if (isNaN(d.getTime())) { showToast('⚠ Invalid date', true); return; }
        entry.date = value;
    } else {
        entry[field] = value;
    }
    autoSave();
    if (field === 'date') renderDepositEntries(year);
    buildSavingsProjectionChart(parseInt(year));
}

// Auto-populate deposit log from checked table rows
// dIdx 0 = 1st cutoff → day 1, dIdx 1 = 2nd cutoff → day 16
// Creates entries tagged with source:'table' so they can be refreshed without clobbering manual entries
function syncFromTable(year) {
    if (!budgetData.data[year]) return;
    const log = getDepositLog(year);
    const goalCats = getGoalCats();

    // Remove all previously synced table entries (keep manual ones)
    budgetData.data[year].depositLog = log.filter(e => e.source !== 'table');

    months.forEach((month, mIdx) => {
        month.dates.forEach((_, dIdx) => {
            const rowId  = `${year}-${mIdx}-${dIdx}`;
            const day    = dIdx === 0 ? 1 : 16;
            const dateStr = `${year}-${String(mIdx + 1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

            goalCats.forEach(cat => {
                const cb  = document.querySelector(`input[type="checkbox"][data-year="${year}"][data-row="${rowId}"][data-cat="${cat.id}"]`);
                if (!cb || !cb.checked) return;
                const inp = document.querySelector(`input[type="number"][data-year="${year}"][data-row="${rowId}"][data-cat="${cat.id}"]`);
                const amt = parseFloat(inp?.value) || 0;
                if (!amt) return;

                budgetData.data[year].depositLog.push({
                    id:     'dl_sync_' + year + '_' + mIdx + '_' + dIdx + '_' + cat.id,
                    catId:  cat.id,
                    date:   dateStr,
                    amount: amt,
                    source: 'table'  // marks this as auto-synced
                });
            });
        });
    });

    renderDepositEntries(year);
    buildSavingsProjectionChart(year);
    autoSave();
    showToast('Synced from table ✓');
}

function deleteDepositEntry(year, id) {
    const entry = getDepositLog(year).find(e => e.id === id);
    const label = entry ? `₱${(entry.amount||0).toLocaleString()} on ${entry.date || '—'}` : 'this entry';
    showConfirm({
        icon: '🗑',
        title: 'Remove deposit?',
        message: `${label} will be removed from the projection.`,
        okLabel: 'Remove',
        onOk: () => {
            if (!budgetData.data[year]) return;
            budgetData.data[year].depositLog = getDepositLog(year).filter(e => e.id !== id);
            renderDepositEntries(year);
            buildSavingsProjectionChart(parseInt(year));
            autoSave();
        }
    });
}

function buildSavingsProjectionChart(year) {
    destroyChart(`proj-${year}`);
    const canvas = document.getElementById(`chart-proj-${year}`);
    const summaryEl = document.getElementById(`projSummary-${year}`);
    if (!canvas) return;

    // Maya TIERED daily interest (Goal accounts opened after Sep 4 2025)
    // Each tier rate applies ONLY to the balance slice within that tier range.
    // No interest earned above P100,000.
    // Tier table:
    //   P0        - P20,000   -> 4.0% p.a.
    //   P20,000   - P40,000   -> 4.5% p.a.
    //   P40,000   - P60,000   -> 5.0% p.a.
    //   P60,000   - P80,000   -> 6.5% p.a.
    //   P80,000   - P100,000  -> 8.0% p.a.
    //   > P100,000            -> 0% (no interest)
    // Daily interest = sum of (tier_slice * tier_rate / 365) for all tiers
    // Monthly interest = sum of daily interest for each day in month

    const MAYA_TIERS = [
        { min: 0,      max: 20000,  rate: 0.040 },
        { min: 20000,  max: 40000,  rate: 0.045 },
        { min: 40000,  max: 60000,  rate: 0.050 },
        { min: 60000,  max: 80000,  rate: 0.065 },
        { min: 80000,  max: 100000, rate: 0.080 },
    ];

    function daysInMonth(monthIdx, yr) {
        return new Date(yr, monthIdx + 1, 0).getDate();
    }

    function dailyInterest(balance) {
        // Maya's exact formula: end-of-day balance × rate × (1/365)
        // Applied per tier slice independently
        let interest = 0;
        for (const tier of MAYA_TIERS) {
            if (balance <= tier.min) break;
            const slice = Math.min(balance, tier.max) - tier.min;
            interest += slice * tier.rate * (1 / 365);
        }
        return interest;
    }

    // deposits = array of { day: 1-31, amount: number } — multiple deposits on different days
    function computeMonthInterestWithDeposits(balanceBefore, deposits, monthIdx, calYear) {
        const days = daysInMonth(monthIdx, calYear);
        let balance = balanceBefore;
        let totalInterest = 0;
        for (let d = 1; d <= days; d++) {
            // Add any deposits scheduled for this day
            deposits.forEach(dep => { if (dep.day === d) balance += dep.amount; });
            totalInterest += dailyInterest(balance);
        }
        return { interest: totalInterest, endBalance: balance + totalInterest };
    }

    // Fallback: original 2-cutoff version
    function computeMonthInterest(balanceBefore, firstHalfDeposit, secondHalfDeposit, monthIdx, calYear) {
        return computeMonthInterestWithDeposits(
            balanceBefore,
            [{ day: 1, amount: firstHalfDeposit }, { day: 16, amount: secondHalfDeposit }],
            monthIdx, calYear
        );
    }

    const selectEl = document.getElementById(`projMonths-${year}`);
    const monthsAhead = parseInt(selectEl?.value || '12');

    const goalCats = getGoalCats();
    if (!goalCats.length) {
        canvas.parentElement.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:0.9em;padding:20px;text-align:center;">No savings goal categories found.</div>';
        return;
    }

    // --- Build deposit log indexed by catId → monthIdx → [{day, amount}] ---
    // Sole data source for the projection.
    const depositLog = getDepositLog(year);
    const logByMonth = {};
    goalCats.forEach(c => {
        logByMonth[c.id] = Array(12).fill(null).map(() => []);
    });
    depositLog.forEach(entry => {
        if (!entry.date || !entry.amount || !entry.catId) return;
        const d = new Date(entry.date + 'T00:00:00');
        if (d.getFullYear() !== year) return;
        const mIdx   = d.getMonth();
        const dayNum = d.getDate();
        if (!logByMonth[entry.catId]) return;
        logByMonth[entry.catId][mIdx].push({ day: dayNum, amount: parseFloat(entry.amount) || 0 });
    });

    // --- 3. Build projection timeline using Maya's daily formula ---
    // totalDisplay = exactly what the user selected (6, 12, 24, 36 months from Jan of selected year)
    const MONTH_NAMES  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    const totalDisplay = monthsAhead; // dropdown value IS the total months shown
    const labels = [];
    for (let i = 0; i < totalDisplay; i++) {
        const calYear = year + Math.floor(i / 12);
        const calMon  = i % 12;
        labels.push(MONTH_NAMES[calMon] + ' \'' + String(calYear).slice(2));
    }

    const goalColors = [
        { line: 'rgba(232,184,75,1)',  fill: 'rgba(232,184,75,0.08)'  },
        { line: 'rgba(78,205,196,1)',  fill: 'rgba(78,205,196,0.08)'  },
        { line: 'rgba(167,139,250,1)', fill: 'rgba(167,139,250,0.08)' },
        { line: 'rgba(95,217,135,1)',  fill: 'rgba(95,217,135,0.08)'  },
        { line: 'rgba(240,107,107,1)', fill: 'rgba(240,107,107,0.08)' },
    ];

    const projEndValues    = {};
    const projTotalDeposit = {};
    const monthlyInterestLog = {};
    const monthlyDepositLog  = {};
    const datasets = [];

    goalCats.forEach((cat, cIdx) => {
        const color = goalColors[cIdx % goalColors.length];
        const data  = [];
        monthlyInterestLog[cat.id] = [];
        monthlyDepositLog[cat.id]  = [];
        let balance = 0;
        let totalDeposited = 0;

        for (let i = 0; i < totalDisplay; i++) {
            const calYear = year + Math.floor(i / 12);
            const calMon  = i % 12;

            let deposited = 0;
            let result;

            if (i < Math.min(12, totalDisplay)) {
                // Within selected year — use deposit log entries (exact day per entry)
                const entries = logByMonth[cat.id]?.[calMon] || [];
                deposited = entries.reduce((s, e) => s + e.amount, 0);
                result = computeMonthInterestWithDeposits(balance, entries, calMon, calYear);
            } else {
                // Beyond selected year — interest only, no new deposits
                deposited = 0;
                result = computeMonthInterestWithDeposits(balance, [], calMon, calYear);
            }

            totalDeposited += deposited;
            balance = result.endBalance;

            const roundedBalance  = Math.round(balance * 100) / 100;
            const roundedInterest = Math.round(result.interest * 100) / 100;

            data.push(roundedBalance);
            monthlyInterestLog[cat.id].push(roundedInterest);
            monthlyDepositLog[cat.id].push(Math.round(deposited * 100) / 100);
        }

        projEndValues[cat.id]    = data[data.length - 1];
        projTotalDeposit[cat.id] = totalDeposited;

        datasets.push({
            label: cat.label,
            data,
            borderColor: color.line,
            backgroundColor: color.fill,
            tension: 0.35,
            pointRadius: 2,
            pointHoverRadius: 6,
            borderWidth: 2.5,
            fill: true,
        });
    });

    const fmt2 = v => '₱' + v.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    charts[`proj-${year}`] = new Chart(canvas, {
        type: 'line',
        data: { labels, datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { display: true, labels: { color: 'rgba(240,242,245,0.55)', font: { family: 'Instrument Sans', size: 11 }, boxWidth: 10, padding: 14 } },
                tooltip: {
                    ...tooltipStyle(),
                    callbacks: {
                        // Title = month label
                        title: items => `End of ${items[0].label}`,
                        // Per-goal line: balance + interest earned this month
                        label: ctx => {
                            const catId  = goalCats[ctx.datasetIndex]?.id;
                            const bal    = ctx.parsed.y;
                            const intAmt = catId ? (monthlyInterestLog[catId]?.[ctx.dataIndex] ?? 0) : 0;
                            const dep    = catId ? (monthlyDepositLog[catId]?.[ctx.dataIndex]  ?? 0) : 0;
                            return [
                                ` ${ctx.dataset.label}`,
                                `   Balance : ${fmt2(bal)}`,
                                `   Deposited: ${fmt2(dep)}`,
                                `   Interest : +${fmt2(intAmt)}`,
                            ];
                        },
                        // Footer = combined total balance
                        afterBody: items => {
                            const totalBal = items.reduce((s,i) => s + i.parsed.y, 0);
                            const totalInt = items.reduce((s,i) => {
                                const catId = goalCats[i.datasetIndex]?.id;
                                return s + (catId ? (monthlyInterestLog[catId]?.[i.dataIndex] ?? 0) : 0);
                            }, 0);
                            return [
                                ``,
                                `  Combined balance : ${fmt2(totalBal)}`,
                                `  Total interest   : +${fmt2(totalInt)}`,
                            ];
                        }
                    }
                },
            },
            scales: {
                x: {
                    grid: { color: 'rgba(255,255,255,0.04)' },
                    ticks: { color: 'rgba(240,242,245,0.4)', font: { family: 'IBM Plex Mono', size: 10 }, maxRotation: 45 }
                },
                y: {
                    grid: { color: 'rgba(255,255,255,0.06)' },
                    ticks: { color: 'rgba(240,242,245,0.4)', font: { family: 'IBM Plex Mono', size: 10 }, callback: v => '₱' + v.toLocaleString() },
                    beginAtZero: true,
                }
            }
        }
    });

    // --- 4. Summary cards ---
    if (summaryEl) {
        const totalProjected = goalCats.reduce((s,c) => s + (projEndValues[c.id]||0), 0);
        const totalInterest  = goalCats.reduce((s,c) => s + Math.max(0,(projEndValues[c.id]||0) - projTotalDeposit[c.id]), 0);

        const perCatCards = goalCats.slice(0, 3).map((cat, i) => {
            const color    = goalColors[i % goalColors.length].line;
            const val      = projEndValues[cat.id] || 0;
            const interest = Math.max(0, val - projTotalDeposit[cat.id]);
            const deposited = projTotalDeposit[cat.id] || 0;
            const targetEl = document.getElementById(`goal_${cat.id}_${year}`);
            const target   = parseFloat(targetEl?.value) || budgetData.data[year]?.goals?.[cat.id] || 0;
            const etaText  = target > 0 ? (() => {
                const ds  = datasets.find(d => d.label === cat.label);
                if (!ds) return '—';
                const idx = ds.data.findIndex(v => v >= target);
                return idx >= 0 ? `~${labels[idx]}` : 'Beyond range';
            })() : null;
            return `<div class="proj-stat" style="border-color:${color.replace('1)','0.25)')};">
                <div class="proj-stat-label" style="color:${color}">${cat.label}</div>
                <div class="proj-stat-value" style="color:${color}">${fmt2(val)}</div>
                <div class="proj-stat-sub">deposited ${fmt2(deposited)}</div>
                <div class="proj-stat-sub">+${fmt2(interest)} interest earned</div>
                ${etaText ? `<div class="proj-stat-sub" style="margin-top:3px">🎯 ${fmt2(target)} → ${etaText}</div>` : ''}
            </div>`;
        }).join('');

        summaryEl.innerHTML = perCatCards + `
            <div class="proj-combined-bar">
                <span class="proj-combined-item">Combined <strong>${fmt2(totalProjected)}</strong></span>
                <span class="proj-combined-sep">·</span>
                <span class="proj-combined-item">Interest <strong style="color:var(--gold)">+${fmt2(totalInterest)}</strong></span>
                <span class="proj-combined-sep">·</span>
                <span class="proj-combined-item" style="color:var(--muted)">Maya 4–8% p.a. tiered · daily accrual</span>
            </div>`;
    }
}

function chartOptions({ title, legend }) {
    return {
        responsive: true, maintainAspectRatio: false,
        plugins: {
            legend: { display: !!legend, labels: { color: 'rgba(240,242,245,0.55)', font: { family: 'Instrument Sans', size: 11 }, boxWidth: 10, padding: 14 } },
            tooltip: { ...tooltipStyle(), callbacks: { label: ctx => ` ₱${(ctx.parsed.y ?? ctx.parsed).toLocaleString()}` } },
        },
        scales: {
            x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: 'rgba(240,242,245,0.4)', font: { family: 'IBM Plex Mono', size: 10 } } },
            y: { grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: 'rgba(240,242,245,0.4)', font: { family: 'IBM Plex Mono', size: 10 }, callback: v => '₱' + v.toLocaleString() }, beginAtZero: true },
        }
    };
}
function tooltipStyle() {
    return { backgroundColor: '#1a1d24', borderColor: 'rgba(232,184,75,0.25)', borderWidth: 1, titleColor: '#f0f2f5', bodyColor: 'rgba(240,242,245,0.6)', padding: 10, titleFont: { family: 'Instrument Sans' }, bodyFont: { family: 'IBM Plex Mono' } };
}

// ══════════════════════════════════════════
// EXPORT / IMPORT / CLEAR
// ══════════════════════════════════════════
function exportData() {
    collectAllData();
    const blob = new Blob([JSON.stringify(budgetData, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `financial-roadmap-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    localStorage.setItem('frm_last_export', new Date().toISOString());
    updateLastSaved();
    showToast('✅ Exported!');
}

function importData(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        try {
            budgetData = JSON.parse(ev.target.result);
            if (!budgetData.categories) budgetData.categories = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
            rebuildAll();
            showToast('✅ Data imported!');
        } catch { showToast('❌ Invalid file', true); }
    };
    reader.readAsText(file);
}

function clearAll() {
    showConfirm({
        icon: '⚠️',
        title: 'Clear all data?',
        message: 'This will permanently wipe all entries for every year. Export a backup first if needed.',
        okLabel: 'Clear Everything',
        onOk: () => {
            budgetData.years.forEach(y => {
                budgetData.data[y] = { entries: {}, completed: {}, goals: {} };
            });
            rebuildAll(true);
            showToast('All data cleared.');
        }
    });
}

// ══════════════════════════════════════════
// REBUILD EVERYTHING (after import / cat change)
// ══════════════════════════════════════════
function rebuildAll(saveAfter = false) {
    document.getElementById('yearContainers').innerHTML = '';
    Object.keys(charts).forEach(k => { try { charts[k].destroy(); } catch{} delete charts[k]; });
    budgetData.years.forEach(y => {
        if (!budgetData.data[y]) budgetData.data[y] = { entries: {}, completed: {}, goals: {} };
        buildYearContainer(y);
    });
    renderYearNav();
    switchYear(currentYear);
    if (saveAfter) saveToLocalStorage();
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
isLoading = true;
loadFromLocalStorage();
const savedYear = parseInt(localStorage.getItem('frm_year'));
if (savedYear && budgetData.years.includes(savedYear)) currentYear = savedYear;
rebuildAll(false); // don't save during init — data already loaded from storage
isLoading = false;
updateLastSaved();
</script>
